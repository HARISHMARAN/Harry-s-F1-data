name: Supply Chain Gate

on:
  pull_request:
  workflow_dispatch:

jobs:
  dependency-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Sloppy Joe
        run: cargo install sloppy-joe --locked

      - name: Sloppy Joe dependency check
        run: sloppy-joe check

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high and critical)
        run: npm audit --audit-level=high
