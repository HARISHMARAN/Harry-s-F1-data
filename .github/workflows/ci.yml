name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Start app
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 &
          echo $! > /tmp/next_pid

      - name: Wait for app
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "App did not start in time" >&2
          exit 1

      - name: Smoke routes
        run: npm run test:integration

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/next_pid ]; then
            kill $(cat /tmp/next_pid) || true
          fi
