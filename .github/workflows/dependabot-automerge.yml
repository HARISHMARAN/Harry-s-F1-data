name: Dependabot Review Gate

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  dependabot-review-gate:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Mark dependency PR for manual review
        run: |
          gh pr edit "$PR_NUMBER" --add-label "dependencies"
          gh pr comment "$PR_NUMBER" --body "Dependency updates require manual review and CI pass before merge. Auto-merge is disabled by policy."
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
